services:
  - type: web
    name: adqlm-service
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn web.app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GOOGLE_API_KEY
        sync: false
      - key: GLOBAL_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATALAB_TOKEN
        sync: false
